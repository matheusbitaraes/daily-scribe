groups:
  - name: daily-scribe.rules
    rules:
      # ──────────────────────────────────────
      # Infrastructure alerts
      # ──────────────────────────────────────
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 2 minutes."

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 90% for 10 minutes."

      - alert: LowDiskSpace
        expr: >
          (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"})
          / node_filesystem_size_bytes{mountpoint="/"} > 0.85
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk usage is above 85%."

      # ──────────────────────────────────────
      # Application alerts
      # ──────────────────────────────────────
      - alert: DatabaseConnectivity
        expr: daily_scribe_database_health != 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connectivity issues"
          description: "Daily Scribe cannot connect to the database."

      - alert: HighErrorRate
        expr: rate(daily_scribe_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      # ──────────────────────────────────────
      # Cron job alerts — designed to catch silent failures
      # ──────────────────────────────────────

      # Catches the exact scenario that caused the 4-day outage:
      # cron container crash-loops so the .prom file never gets created,
      # making all metric-based checks evaluate to empty (no alert).
      - alert: CronMetricsAbsent
        expr: absent(daily_scribe_cronjob_last_run_timestamp{cronjob="full-run"})
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Cron metrics are missing — cron container may be down"
          description: >-
            The metric daily_scribe_cronjob_last_run_timestamp{cronjob="full-run"}
            has been absent for 30 minutes. This typically means the cron container
            is not running or is crash-looping and no jobs can execute.

      - alert: FullRunNotRunning
        expr: time() - daily_scribe_cronjob_last_success_timestamp{cronjob="full-run"} > 7200
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "full-run cron job has not succeeded in 2+ hours"
          description: >-
            The full-run job last succeeded {{ $value | humanizeDuration }} ago.
            Articles are not being fetched or enriched.

      - alert: SendDigestNotRunning
        expr: time() - daily_scribe_cronjob_last_success_timestamp{cronjob="send-digest"} > 86400
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "send-digest has not succeeded in 24+ hours"
          description: >-
            The send-digest job last succeeded {{ $value | humanizeDuration }} ago.
            No digest emails are being delivered to subscribers.

      - alert: CronJobFailing
        expr: increase(daily_scribe_cronjob_runs_total{status="error"}[2h]) > 2
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Cron job {{ $labels.cronjob }} is failing repeatedly"
          description: >-
            {{ $labels.cronjob }} has recorded {{ $value }} errors in the last 2 hours.

      # ──────────────────────────────────────
      # Article processing — catches pipeline stalls
      # ──────────────────────────────────────
      - alert: NoArticlesProcessed
        expr: increase(daily_scribe_articles_processed_total[6h]) == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "No articles have been processed in 6 hours"
          description: >-
            The articles_processed_total counter has not increased in 6 hours.
            The full-run pipeline may be broken even though the job reports success.

      - alert: NoDigestsSent
        expr: increase(daily_scribe_digests_generated_total[24h]) == 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "No digests have been sent in 24 hours"
          description: >-
            The digests_generated_total counter has not increased in 24 hours.
            Subscribers are not receiving their daily emails.
