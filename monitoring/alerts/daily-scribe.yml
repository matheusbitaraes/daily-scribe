groups:
  - name: daily-scribe.rules
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 2 minutes."

      - alert: HighErrorRate
        expr: rate(daily_scribe_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 90% on {{ $labels.instance }}"

      - alert: LowDiskSpace
        expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"} > 0.9
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk usage is above 90% on {{ $labels.instance }}"

      - alert: DatabaseConnectivity
        expr: daily_scribe_database_health != 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connectivity issues"
          description: "Daily Scribe cannot connect to the database"

      - alert: CronJobNotRunning
        expr: time() - daily_scribe_cronjob_last_success_timestamp{cronjob="full-run"} > 7200
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Cron job {{ $labels.cronjob }} has not run successfully"
          description: "The {{ $labels.cronjob }} cron job has not completed successfully in over 2 hours"

      - alert: CronJobFailing
        expr: increase(daily_scribe_cronjob_runs_total{status="error"}[1h]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Cron job {{ $labels.cronjob }} is failing"
          description: "The {{ $labels.cronjob }} cron job has recorded {{ $value }} error(s) in the last hour"
